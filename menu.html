<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YouTube Sidebar</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:300px;
    padding:12px;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#ffffff;
    color:#222;
}

.header{
    margin-bottom:12px;
}

.header h1{
    font-size:16px;
    font-weight:600;
}

.card{
    background:#fafafa;
    border:1px solid #e6e6e6;
    border-radius:10px;
    padding:10px;
    margin-bottom:10px;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.section-title{
    font-size:13px;
    font-weight:600;
    margin-bottom:8px;
}

.radio-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px 12px;
}

.option{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
}

input[type="radio"]{
    margin:0;
}

.switch{
    position:relative;
    display:inline-block;
    width:44px;
    height:24px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    inset:0;
    background:#ccc;
    border-radius:24px;
    transition:.2s;
    cursor:pointer;
}

.slider:before{
    content:"";
    position:absolute;
    height:18px;
    width:18px;
    left:3px;
    top:3px;
    background:white;
    border-radius:50%;
    transition:.2s;
}

input:checked + .slider{
    background:#1a73e8;
}

input:checked + .slider:before{
    transform:translateX(20px);
}

.footer{
    border-top:1px solid #e6e6e6;
    padding-top:8px;
    text-align:center;
    font-size:12px;
}

.footer a{
    color:#1a73e8;
    text-decoration:none;
}

.footer a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="header">
    <h1>YouTube Sidebar</h1>
</div>

<div class="card">
    <div class="row">
        <span>Extension Enabled</span>
        <label class="switch">
            <input id="toggleswitcher" type="checkbox">
            <span class="slider"></span>
        </label>
    </div>
</div>

<div id="settings-container"></div>

<div class="footer">
    <a href="https://ugwattu.github.io/YouTube-SideBar-website/" target="_blank">
        Website
    </a>
    &nbsp;•&nbsp;
    <a href="https://github.com/Ugwattu/youtubesidebar/issues" target="_blank">
        Report Issue
    </a>
</div>

<script src="vmenu.js"></script>
</body>
</html>
